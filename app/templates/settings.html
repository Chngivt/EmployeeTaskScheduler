{% extends 'base.html' %}

{% block content %}
<div class="mb-4">
    <h4 class="fw-bold text-dark mb-1"><i class="bi bi-gear-fill text-secondary me-2"></i> Cài Đặt Hệ Thống</h4>
    <small class="text-muted">Quản lý cấu hình chung và thông tin tài khoản</small>
</div>

<div class="card shadow-sm border-0 rounded-4 p-4 max-w-lg">
    <h5 class="fw-bold mb-3">Thông tin tài khoản</h5>
    <div class="mb-3">
        <label class="form-label text-muted small">Người dùng hiện tại</label>
        <input type="text" class="form-control" value="{{ session.get('fullname', '') }}" disabled>
    </div>
    <div class="mb-3">
        <label class="form-label text-muted small">Vai trò</label>
        <input type="text" class="form-control" value="{{ session.get('role', 'employee') }}" disabled>
    </div>
    <div class="mb-3">
        <label class="form-label text-muted small">Địa chỉ IP đăng nhập</label>
        <input type="text" class="form-control text-info fw-bold" value="{{ session.get('ip_address', 'N/A') }}" disabled>
    </div>
</div>
{% endblock %}
