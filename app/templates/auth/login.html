<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Employee Task Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            border: none;
        }
    </style>
</head>
<body>
    <div class="card login-card p-4">
        <div class="text-center mb-4">
            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 56px; height: 56px;">
                <i class="bi bi-calendar-check-fill fs-4"></i>
            </div>
            <h4 class="fw-bold text-dark">Đăng Nhập Hệ Thống</h4>
            <p class="text-muted small mb-0">Employee Task Scheduler</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 small text-center">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-semibold">Email đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" required placeholder="nhanvien@company.com">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-semibold">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" required placeholder="********">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Đăng Nhập</button>
        </form>

        <div class="text-center mt-3">
            <span class="small text-muted">Chưa có tài khoản?</span>
            <a href="/register" class="text-decoration-none small fw-semibold">Đăng ký ngay</a>
        </div>

        <div class="text-center mt-2">
            <a href="/" class="text-decoration-none small text-muted"><i class="bi bi-arrow-left me-1"></i> Quay lại trang chủ</a>
        </div>
    </div>
</body>
</html>
