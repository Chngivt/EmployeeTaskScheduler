<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Employee Task Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px 0; }
        .register-card { width: 100%; max-width: 500px; border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

    <div class="card register-card p-4 bg-white">
        <div class="text-center mb-3">
            <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width: 45px; height: 45px;">
                <i class="bi bi-person-plus-fill fs-5"></i>
            </div>
            <h4 class="fw-bold text-dark">Đăng Ký Tài Khoản</h4>
            <p class="text-muted small">Tạo tài khoản nhân viên mới trên hệ thống</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 small text-center">{{ error }}</div>
        {% endif %}

        <form action="/register" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-semibold">Mã Nhân Viên</label>
                    <input type="text" name="code" class="form-control form-control-sm" required placeholder="NV001">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-semibold">Họ và Tên</label>
                    <input type="text" name="fullname" class="form-control form-control-sm" required placeholder="Nguyễn Văn A">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-semibold">Email cá nhân / công việc</label>
                <input type="email" name="email" class="form-control form-control-sm" required placeholder="email@company.com">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-semibold">Số điện thoại</label>
                    <input type="text" name="phone" class="form-control form-control-sm" required placeholder="0912345678">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-semibold">Phòng ban</label>
                    <input type="text" name="department" class="form-control form-control-sm" required placeholder="Kỹ thuật">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-semibold">Chức vụ</label>
                <input type="text" name="position" class="form-control form-control-sm" required placeholder="Nhân viên">
            </div>

            <div class="mb-4">
                <label class="form-label small fw-semibold">Mật khẩu đăng nhập</label>
                <input type="password" name="password" class="form-control form-control-sm" required placeholder="********">
            </div>

            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">Đăng Ký Ngay</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/login" class="text-decoration-none small text-primary fw-semibold">Đã có tài khoản? Đăng nhập ngay</a>
        </div>
    </div>

</body>
</html>
