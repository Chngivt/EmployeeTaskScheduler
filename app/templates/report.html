{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="fw-bold text-dark mb-1"><i class="bi bi-graph-up-arrow text-primary me-2"></i> Báo Cáo & Thống Kê</h4>
        <small class="text-muted">Tổng hợp hiệu suất phân công và tiến độ công việc</small>
    </div>
    <a href="/export/tasks" class="btn btn-success shadow-sm rounded-pill px-3">
        <i class="bi bi-file-earmark-excel me-1"></i> Xuất Báo Cáo Excel
    </a>
</div>

<div class="row g-3">
    <div class="col-md-4">
        <div class="card p-3 shadow-sm border-0 rounded-4 bg-primary text-white">
            <h5>Tổng số nhân sự</h5>
            <h2 class="fw-bold mb-0">{{ total_emp }}</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3 shadow-sm border-0 rounded-4 bg-success text-white">
            <h5>Công việc đã tạo</h5>
            <h2 class="fw-bold mb-0">{{ total_task }}</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3 shadow-sm border-0 rounded-4 bg-warning text-dark">
            <h5>Lượt phân công</h5>
            <h2 class="fw-bold mb-0">{{ total_schedule }}</h2>
        </div>
    </div>
</div>
{% endblock %}
