{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 600px;">
    <div class="card-header bg-success text-white"><h4>Thêm Công Việc</h4></div>
    <div class="card-body">
        <form action="/task/add" method="POST">
            <div class="mb-3"><label>Mã CV</label><input type="text" name="code" class="form-control" required></div>
            <div class="mb-3"><label>Tên CV</label><input type="text" name="task_name" class="form-control" required></div>
            <div class="mb-3">
                <label>Độ Ưu Tiên</label>
                <select name="priority" class="form-select">
                    <option value="1">Cao (1)</option>
                    <option value="2">Trung bình (2)</option>
                    <option value="3">Thấp (3)</option>
                </select>
            </div>
            <div class="mb-3"><label>Thời Lượng (Giờ)</label><input type="number" name="duration" class="form-control" required></div>
            <div class="d-flex justify-content-between">
                <a href="/task" class="btn btn-secondary">Quay lại</a>
                <button type="submit" class="btn btn-success">Lưu</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
