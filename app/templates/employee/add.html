{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Thêm Nhân Viên Mới</h4>
            </div>
            <div class="card-body">
                <!-- Form gửi dữ liệu (Đã thêm enctype="multipart/form-data" để hỗ trợ tải file ảnh) -->
                <form action="/employee/add" method="POST" enctype="multipart/form-data">
                   
                    <!-- Ô CHỌN ẢNH ĐẠI DIỆN -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Ảnh Đại Diện</label>
                        <input type="file" class="form-control" name="avatar" accept="image/*">
                        <div class="form-text">Hỗ trợ các định dạng file ảnh: JPG, PNG, JPEG.</div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Mã Nhân Viên</label>
                            <input type="text" class="form-control" name="code" required placeholder="VD: NV01">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Họ và Tên</label>
                            <input type="text" class="form-control" name="fullname" required placeholder="VD: Nguyễn Văn A">
                        </div>
                    </div>
                   
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required placeholder="VD: nva@gmail.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số Điện Thoại</label>
                            <input type="text" class="form-control" name="phone" required placeholder="VD: 0901234567">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Phòng Ban</label>
                            <select class="form-select" name="department">
                                <option value="Kỹ thuật">Kỹ thuật</option>
                                <option value="Kinh doanh">Kinh doanh</option>
                                <option value="Kế toán">Kế toán</option>
                                <option value="Hành chính">Hành chính</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Chức Vụ</label>
                            <input type="text" class="form-control" name="position" required placeholder="VD: Nhân viên">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/employee" class="btn btn-secondary">Quay lại</a>
                        <button type="submit" class="btn btn-success">Lưu Thông Tin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
