{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm mx-auto rounded-4 border-0" style="max-width: 650px;">
    <div class="card-header bg-primary text-white py-3 rounded-top-4">
        <h4 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-2"></i>Chỉnh Sửa Thông Tin Nhân Viên</h4>
    </div>
    <div class="card-body p-4">
        
        {% if error %}
        <div class="alert alert-danger mb-3">{{ error }}</div>
        {% endif %}

        <!-- BỔ SUNG: enctype="multipart/form-data" ĐỂ HỖ TRỢ UPLOAD ẢNH -->
        <form method="POST" enctype="multipart/form-data">

            <!-- BỔ SUNG: KHUNG HIỂN THỊ & BẤM THAY ĐỔI ẢNH ĐẠI DIỆN -->
            <div class="mb-4 text-center">
                <div class="mb-2">
                    {% if emp.avatar %}
                        <img src="{{ url_for('static', filename='uploads/avatars/' + emp.avatar) }}" 
                             alt="{{ emp.fullname }}" 
                             class="rounded-circle border shadow-sm" 
                             style="width: 80px; height: 80px; object-fit: cover;">
                    {% else %}
                        <div class="bg-primary bg-opacity-15 text-primary rounded-circle d-inline-flex align-items-center justify-content-center fw-bold" 
                             style="width: 80px; height: 80px; font-size: 28px;">
                            {{ emp.fullname[0]|upper }}
                        </div>
                    {% endif %}
                </div>
                <label class="form-label small fw-semibold text-muted">Thay đổi ảnh đại diện (Bỏ trống nếu giữ ảnh cũ)</label>
                <input type="file" name="avatar" class="form-control form-control-sm mx-auto" accept="image/*" style="max-width: 350px;">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Mã Nhân Viên (Không đổi)</label>
                <input type="text" class="form-control bg-light" value="{{ emp.code }}" disabled>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-semibold">Họ và Tên <span class="text-danger">*</span></label>
                <input type="text" name="fullname" class="form-control" value="{{ emp.fullname }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                <input type="email" name="email" class="form-control" value="{{ emp.email }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-semibold">Số Điện Thoại</label>
                <input type="text" name="phone" class="form-control" value="{{ emp.phone }}">
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-semibold">Phòng Ban</label>
                <input type="text" name="department" class="form-control" value="{{ emp.department }}">
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-semibold">Chức Vụ</label>
                <input type="text" name="position" class="form-control" value="{{ emp.position }}">
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-semibold">Quyền Hạn (Role)</label>
                <select name="role" class="form-select">
                    <option value="employee" {% if emp.role == 'employee' %}selected{% endif %}>Nhân viên (Employee)</option>
                    <option value="admin" {% if emp.role == 'admin' %}selected{% endif %}>Quản trị (Admin)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Mật Khẩu Mới (Bỏ trống nếu không muốn đổi)</label>
                <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu mới nếu cần đổi">
            </div>

            <div class="d-flex justify-content-between pt-2">
                <a href="/employee" class="btn btn-light rounded-pill px-4">Quay lại</a>
                <button type="submit" class="btn btn-primary rounded-pill px-4"><i class="bi bi-check-lg me-1"></i> Lưu Thay Đổi</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
