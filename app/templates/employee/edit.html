{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Cập Nhật Thông Tin Nhân Viên</h4>
            </div>
            <div class="card-body">
                <!-- Form gửi dữ liệu tới đúng ID của nhân viên đang sửa -->
                <form action="/employee/edit/{{ emp.id }}" method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Mã Nhân Viên</label>
                            <input type="text" class="form-control" name="code" value="{{ emp.code }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Họ và Tên</label>
                            <input type="text" class="form-control" name="fullname" value="{{ emp.fullname }}" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" value="{{ emp.email }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số Điện Thoại</label>
                            <input type="text" class="form-control" name="phone" value="{{ emp.phone }}" required>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Phòng Ban</label>
                            <select class="form-select" name="department">
                                <option value="Kỹ thuật" {% if emp.department == 'Kỹ thuật' %}selected{% endif %}>Kỹ thuật</option>
                                <option value="Kinh doanh" {% if emp.department == 'Kinh doanh' %}selected{% endif %}>Kinh doanh</option>
                                <option value="Kế toán" {% if emp.department == 'Kế toán' %}selected{% endif %}>Kế toán</option>
                                <option value="Hành chính" {% if emp.department == 'Hành chính' %}selected{% endif %}>Hành chính</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Chức Vụ</label>
                            <input type="text" class="form-control" name="position" value="{{ emp.position }}" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/employee" class="btn btn-secondary">Quay lại</a>
                        <button type="submit" class="btn btn-primary">Lưu Thay Đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
